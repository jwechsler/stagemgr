# Default Nginx site for Stagemgr.
# Serves the Rails app at the root path. Suitable for a standalone Stagemgr
# install where there is no separate marketing-site frontend in front of it.
#
# To run stagemgr behind a separate foundation/marketing site at /tickets/*,
# swap this file for docker/nginx.foundation.conf via the `frontend`
# compose profile (see docker-compose.yml).

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    root /var/www/stagemgr/public;
    passenger_enabled on;
    passenger_app_root /var/www/stagemgr;
    passenger_document_root /var/www/stagemgr/public;
    passenger_app_env development;
    passenger_sticky_sessions on;
    passenger_ruby /usr/local/rvm/wrappers/ruby-3.2.2@stagemgr/ruby;
    passenger_user app;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /var/www/stagemgr/public; }
}
