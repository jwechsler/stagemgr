# Nginx site for Stagemgr running behind a separate foundation/marketing site.
# Activated by the `frontend` compose profile, which bind-mounts this file over
# /etc/nginx/sites-enabled/stagemgr.conf and brings up the foundation service.
#
# Layout:
#   /            → static content from /var/www/foundation-dist (foundation build)
#   /tickets/*   → Rails app (Passenger)

server {
    listen 80;
    server_name _;

    location / {
        root /var/www/foundation-dist;
        index index.html;
    }

    location ~ /tickets(/.*|$) {
        client_max_body_size 10M;
        alias /var/www/stagemgr/public$1;
        passenger_base_uri /tickets;
        passenger_app_root /var/www/stagemgr;
        passenger_document_root /var/www/stagemgr/public;
        passenger_enabled on;
        passenger_app_env development;
        passenger_sticky_sessions on;
        passenger_ruby /usr/local/rvm/wrappers/ruby-3.2.2@stagemgr/ruby;
        passenger_user app;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /var/www/foundation-dist; }
}
