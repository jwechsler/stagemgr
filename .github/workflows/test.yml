name: Test

on:
  push:
  pull_request:

jobs:
  rspec-cucumber:
    runs-on: ubuntu-latest

    services:
      # Ephemeral MySQL created and destroyed by the runner each run — nothing
      # to host or maintain. Loaded fresh from db/schema.rb below.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stagemgr_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      RAILS_ENV: test
      # config/database.yml.example reads these; the generated database.yml
      # points the test/cucumber DBs at the MySQL service above.
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 3306
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      TEST_DATABASE: stagemgr_test
      REDIS_URL: redis://localhost:6379
      # No RAILS_MASTER_KEY needed: the test env decrypts
      # config/credentials/test.yml.enc with the committed, dummy-only test.key.

    steps:
      - uses: actions/checkout@v4

      # System libs the app's native gems need:
      #  - default-libmysqlclient-dev: build the mysql2 extension
      #  - libvips-dev: ruby-vips (image_processing) loads libvips.so at boot
      # Installed before ruby/setup-ruby so bundler-cache's `bundle install` works.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev libvips-dev

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # Sprockets resolves what-input / foundation-sites out of node_modules
      # (see app/assets/javascripts/application.js), so full-page renders in
      # Cucumber need JS dependencies installed. Without them every page that
      # includes the application bundle 500s.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Generate config files from templates
        run: bundle exec rake config:setup

      - name: Load the test database schema
        run: bundle exec rails db:create db:schema:load

      - name: RSpec
        run: bundle exec rspec

      - name: Cucumber (non-JS)
        env:
          # Surface real exceptions instead of the app's rescue_from redirect
          # (which turns any per-request error into an InfiniteRedirectError).
          RAILS_RAISE_ERRORS: "1"
        run: bundle exec cucumber --tags "not @javascript"

      - name: Dump test log on failure
        if: always()
        run: tail -300 log/test.log || true
